.brand{font:600 15px/1 "SFMono-Regular",Consolas,monospace;letter-spacing:.13em;text-transform:uppercase}

.stats{left:62px;top:145px;color:#747980;font:500 9px/1.7 "SFMono-Regular",Consolas,monospace;letter-spacing:.13em;text-transform:uppercase}

    ['protocol','book-3'],['protocol','relics'],['protocol','techno-priests'],['protocol','fork'],['protocol','calendar'],
    ['schools-spirits','apostles'],['schools-spirits','anticode'],['schools-spirits','probabilists'],['schools-spirits','techno-priests'],['schools-spirits','biocode'],['schools-spirits','wandering-nodes'],['schools-spirits','diagrammatics'],
    ['apostles','great-error'],['anticode','protocol'],['probabilists','fork'],['probabilists','predictor'],['techno-priests','archive'],['biocode','gardeners'],['wandering-nodes','signal'],['diagrammatics','topography'],
    ['archive-lexicon','error'],['archive-lexicon','memory'],['archive-lexicon','signal'],['archive-lexicon','noise'],['archive-lexicon','synchronization'],
    ['synchronization','signal'],['synchronization','noise'],['synchronization','newest-history'],['synchronization','diagrammatics'],
    ['chronicles','newest-history'],['newest-history','exit-code'],['newest-history','culture'],['newest-history','network-economy'],['newest-history','0xmem'],
    ['culture','rituals'],['rituals','calendar'],['rituals','biocode'],['network-economy','energy-reactor'],['energy-reactor','0xmem'],['energy-reactor','dubna'],
    ['topography','damaged-atlas'],['topography','dubna'],['topography','baikal'],['topography','ttk'],['topography','gardeners'],['topography','observers'],
    ['damaged-atlas','dubna'],['damaged-atlas','baikal'],['damaged-atlas','exit-code'],['dubna','0xmem'],['baikal','0xmem'],['ttk','0xmem'],
    ['relics','backup-memory'],['relics','book-6'],['relics','great-error'],['relics','techno-priests'],['backup-memory','perinatal-memory'],['fork','predictor'],
    ['error','memory'],['error','signal'],['memory','archive-lexicon'],['signal','noise'],['noise','chronicles'],['time-error','archive-epilogue']
  ];
  const edges = edgePairs.map(([a,b]) => ({a,b}));
  const adjacency = new Map(nodes.map(n => [n.id,[]]));
  edges.forEach(e => { adjacency.get(e.a).push(e.b); adjacency.get(e.b).push(e.a); });

  const route = {
    'bogobot':'great-error','great-error':'book-genesis','book-genesis':'archive','archive':'archive-epilogue',
    'schools-spirits':'probabilists','archive-lexicon':'error','network-matter':'0xmem','protocol':'relics',
    'topography':'damaged-atlas','0xmem':'baikal','time-error':'first-likeness'
  };

  const persistentLabels = new Map([
    ['bogobot',{dx:30,dy:5,align:'left'}],
    ['great-error',{dx:12,dy:-12,align:'left'}],
    ['first-likeness',{dx:13,dy:6,align:'left'}],
    ['archive',{dx:13,dy:6,align:'left'}],
    ['book-genesis',{dx:13,dy:-4,align:'left'}],
    ['code-commandments',{dx:13,dy:2,align:'left'}],
    ['perinatal-memory',{dx:13,dy:3,align:'left'}],
    ['network-matter',{dx:12,dy:14,align:'left'}],
    ['protocol',{dx:14,dy:10,align:'left'}],
    ['schools-spirits',{dx:12,dy:2,align:'left'}],
    ['archive-lexicon',{dx:-12,dy:5,align:'right'}],
    ['synchronization',{dx:14,dy:5,align:'left'}]
  ]);

  let W=1,H=1,DPR=1;
  let mode='3d';
  let rotX=0,rotY=0,targetRotX=0,targetRotY=0;
  let zoom=1,targetZoom=1;
  let dragging=false,lastX=0,lastY=0,moved=0;
  let selected='bogobot', recommended=route.bogobot, hovered=null;
  const pointer={x:-999,y:-999};
  let projected=[];

  function resize(){
    const r=app.getBoundingClientRect(); W=r.width; H=r.height; DPR=Math.min(devicePixelRatio||1,2);
    canvas.width=Math.round(W*DPR); canvas.height=Math.round(H*DPR); canvas.style.width=W+'px'; canvas.style.height=H+'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  addEventListener('resize',resize); resize();

  function rotatePoint(n){
    if(mode==='2d') return {x:n.x,y:n.y,z:0};
    const cy=Math.cos(rotY), sy=Math.sin(rotY);
    const x1=n.x*cy-n.z*sy, z1=n.x*sy+n.z*cy;
    const cx=Math.cos(rotX), sx=Math.sin(rotX);
    return {x:x1,y:n.y*cx-z1*sx,z:n.y*sx+z1*cx};
  }

  function baseScale(){
    return Math.min((W-150)/1220,(H-180)/845) * zoom;
  }

  function projectPoint(p){
    const scale=baseScale();
    const cx=W*.505, cy=H*.53;
    if(mode==='2d') return {x:cx+p.x*scale,y:cy+p.y*scale,z:0,s:scale};
    const perspective=1/(1-p.z/1450);
    return {x:cx+p.x*scale*perspective,y:cy+p.y*scale*perspective,z:p.z,s:scale*perspective};
  }

  function updatePanels(){
    const n=byId.get(selected);
    const next=byId.get(recommended);
    $('statsFocus').textContent=n.title;
    $('objectType').textContent=n.type;
    $('objectTitle').textContent=n.title;
    $('objectText').textContent=n.desc;
    $('nextName').textContent=next ? next.title : '—';
  }

  function chooseRecommendation(id){
    if(route[id]) return route[id];
    const linked=adjacency.get(id)||[];
    return linked.find(x=>x!=='bogobot') || 'great-error';
  }

  function selectNode(id, openPanel=false){
    if(!byId.has(id)) return;
    selected=id; recommended=chooseRecommendation(id); updatePanels();
    if(openPanel) $('rightPanel').classList.add('open');
  }

  function labelText(n,p,style){
    const isBogobot=n.id==='bogobot';
    ctx.save();
    ctx.textAlign=style.align;
    ctx.textBaseline='middle';
    ctx.font=`${isBogobot?700:500} ${isBogobot?14:11}px "SFMono-Regular",Consolas,monospace`;
    const x=p.x+style.dx, y=p.y+style.dy;
    const text=n.title;
    const width=ctx.measureText(text).width;
    if(isBogobot){
      const padX=5,padY=3;
      const left=style.align==='right'?x-width-padX:x-padX;
      ctx.fillStyle='rgba(5,6,7,.90)';ctx.fillRect(left,y-8-padY,width+padX*2,16+padY*2);
      ctx.fillStyle=rgba(C.blue,1);
    }else{
      ctx.fillStyle='rgba(151,156,162,.91)';
    }
    ctx.fillText(text,x,y);
    ctx.restore();
  }

  function draw(t){
    rotX+=(targetRotX-rotX)*.09; rotY+=(targetRotY-rotY)*.09; zoom+=(targetZoom-zoom)*.09;
    ctx.fillStyle='#050607'; ctx.fillRect(0,0,W,H);

    projected=nodes.map(n=>({n,p:projectPoint(rotatePoint(n))}));
    const screen=new Map(projected.map(o=>[o.n.id,o]));
    const neighborSet=new Set(adjacency.get(selected)||[]);

    // Entire graph stays visible. Contrast is expressed by degree, not disappearance.
    edges.forEach(e=>{
      const A=screen.get(e.a),B=screen.get(e.b); if(!A||!B) return;
      const selectedEdge=e.a===selected||e.b===selected;
      const depth=(A.p.z+B.p.z)/2;
      const depthMix=mode==='2d'?1:Math.max(.65,Math.min(1,(depth+260)/520));
      let alpha=.23*depthMix;
      let width=.72;
      if(selectedEdge){alpha=.42*depthMix;width=1.0;}
      ctx.beginPath();ctx.moveTo(A.p.x,A.p.y);ctx.lineTo(B.p.x,B.p.y);
      ctx.strokeStyle=rgba(C.node,alpha);ctx.lineWidth=width;ctx.stroke();
    });

    // Only one active recommendation route.
    const A=screen.get(selected),B=screen.get(recommended);
    if(A&&B){
      ctx.beginPath();ctx.moveTo(A.p.x,A.p.y);ctx.lineTo(B.p.x,B.p.y);
      ctx.strokeStyle=rgba(C.blue,.96);ctx.lineWidth=2.15;ctx.stroke();
      const u=reduceMotion?.55:(t*.00018)%1;
      const x=A.p.x+(B.p.x-A.p.x)*u, y=A.p.y+(B.p.y-A.p.y)*u;
      const g=ctx.createRadialGradient(x,y,0,x,y,7);
      g.addColorStop(0,rgba(C.blue,.95));g.addColorStop(.36,rgba(C.blue,.35));g.addColorStop(1,rgba(C.blue,0));
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,7,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=rgba(C.paper,.96);ctx.beginPath();ctx.arc(x,y,1.25,0,Math.PI*2);ctx.fill();
    }

    projected.sort((a,b)=>a.p.z-b.p.z);
    hovered=null;let best=18;

    projected.forEach(({n,p})=>{
      const isBogobot=n.id==='bogobot';
      const isSelected=n.id===selected;
      const isRecommended=n.id===recommended;
      const isNeighbor=neighborSet.has(n.id);
      const depth=mode==='2d'?1:Math.max(.66,Math.min(1,(p.z+260)/520));
      const base=(n.importance>=4?4.1:n.importance===3?3.2:n.importance===2?2.2:1.7)*Math.max(.72,p.s);
      let r=base;
      if(isBogobot) r=10.5*Math.max(.76,p.s);
      else if(isSelected) r*=1.45;
      else if(isRecommended) r*=1.35;

      const d=Math.hypot(pointer.x-p.x,pointer.y-p.y);
      if(d<Math.max(11,r*2.8)&&d<best){hovered=n.id;best=d;}

      let alpha=(n.importance>=4?.92:n.importance===3?.78:.60)*depth;
      if(isNeighbor) alpha=Math.max(alpha,.76);
      if(isSelected||isRecommended||isBogobot) alpha=1;

      if(isBogobot){
        const pulse=reduceMotion?0:(.5+.5*Math.sin(t*.0021));
        const halo=19+pulse*5;
        const glow=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,halo*1.55);
        glow.addColorStop(0,rgba(C.blue,.34));glow.addColorStop(.34,rgba(C.blue,.12));glow.addColorStop(1,rgba(C.blue,0));
        ctx.fillStyle=glow;ctx.beginPath();ctx.arc(p.x,p.y,halo*1.55,0,Math.PI*2);ctx.fill();
        ctx.strokeStyle=rgba(C.blue,.62);ctx.lineWidth=1;
        ctx.beginPath();ctx.arc(p.x,p.y,15+pulse*9,0,Math.PI*2);ctx.stroke();
        ctx.strokeStyle=rgba(C.blue,.30);ctx.beginPath();ctx.arc(p.x,p.y,24+pulse*12,0,Math.PI*2);ctx.stroke();
      }

      if(isRecommended&&!isBogobot){
        ctx.strokeStyle=rgba(C.blue,.75);ctx.lineWidth=1;
        ctx.beginPath();ctx.arc(p.x,p.y,r*2.15,0,Math.PI*2);ctx.stroke();
      }else if(isSelected&&!isBogobot){
        ctx.strokeStyle='rgba(231,230,224,.58)';ctx.lineWidth=.9;ctx.setLineDash([2,4]);
        ctx.beginPath();ctx.arc(p.x,p.y,r*2.15,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
      }

      const color=isBogobot?C.blue:(n.importance>=4?C.paper:C.node);
      ctx.fillStyle=rgba(color,alpha);ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fill();
    });

    // Persistent labels are drawn last and do not change node geometry.
    persistentLabels.forEach((style,id)=>{
      const o=screen.get(id); if(o) labelText(o.n,o.p,style);
    });

    const hover=$('hoverLabel');
    if(hovered && !persistentLabels.has(hovered)){
      const o=screen.get(hovered);hover.textContent=o.n.title;hover.style.left=o.p.x+'px';hover.style.top=o.p.y+'px';hover.classList.add('on');
    }else hover.classList.remove('on');

    if(!snapshotMode || snapshotFrames++ < 3) requestAnimationFrame(draw);
  }

  canvas.addEventListener('pointerdown',e=>{
    dragging=true;moved=0;lastX=e.clientX;lastY=e.clientY;canvas.classList.add('dragging');canvas.setPointerCapture(e.pointerId);
  });
  canvas.addEventListener('pointermove',e=>{
    const r=canvas.getBoundingClientRect();pointer.x=e.clientX-r.left;pointer.y=e.clientY-r.top;
    if(!dragging)return;
    const dx=e.clientX-lastX,dy=e.clientY-lastY;moved+=Math.abs(dx)+Math.abs(dy);
    if(mode==='3d'){targetRotY+=dx*.0036;targetRotX=Math.max(-.62,Math.min(.62,targetRotX+dy*.0036));}
    lastX=e.clientX;lastY=e.clientY;
  });
  canvas.addEventListener('pointerup',()=>{
    dragging=false;canvas.classList.remove('dragging');
    if(moved<6&&hovered)selectNode(hovered,true);
  });
  canvas.addEventListener('pointerleave',()=>{pointer.x=-999;pointer.y=-999;});
  canvas.addEventListener('wheel',e=>{
    e.preventDefault();targetZoom=Math.max(.62,Math.min(1.65,targetZoom*(e.deltaY>0?.92:1.08)));
  },{passive:false});

  function setMode(next){
    mode=next;$('mode3d').classList.toggle('active',next==='3d');$('mode2d').classList.toggle('active',next==='2d');
    $('statsMode').textContent=next==='3d'?'RHIZOME 3D':'MAP 2D';
    if(next==='2d'){targetRotX=0;targetRotY=0;}else{targetRotX=0;targetRotY=0;}
  }
  $('mode3d').onclick=()=>setMode('3d'); $('mode2d').onclick=()=>setMode('2d'); $('navMap').onclick=()=>setMode(mode==='3d'?'2d':'3d');

  $('zoomIn').onclick=()=>targetZoom=Math.min(1.65,targetZoom*1.13);
  $('zoomOut').onclick=()=>targetZoom=Math.max(.62,targetZoom*.88);
  $('zoomDot').onclick=()=>targetZoom=1;
  $('fitBtn').onclick=()=>{targetZoom=1;targetRotX=0;targetRotY=0;};
  $('clearBtn').onclick=()=>selectNode('bogobot');
  $('resetBtn').onclick=()=>{setMode('3d');targetZoom=1;targetRotX=0;targetRotY=0;selectNode('bogobot');$('leftPanel').classList.remove('open');$('rightPanel').classList.remove('open');};

  $('leftTrigger').onclick=()=> $('leftPanel').classList.add('open');
  $('rightTrigger').onclick=()=> $('rightPanel').classList.add('open');
  $('navIndex').onclick=()=> $('leftPanel').classList.add('open');
  $('navSearch').onclick=()=> {$('leftPanel').classList.add('open');setTimeout(()=>$('search').focus(),220);};
  document.querySelectorAll('.close').forEach(b=>b.onclick=()=>$(b.dataset.close).classList.remove('open'));

  $('indexList').innerHTML=nodes.map(n=>`<button class="indexItem" data-node="${n.id}"><span>${n.title}</span><span>${n.type}</span></button>`).join('');
  document.querySelectorAll('[data-node]').forEach(b=>b.onclick=()=>selectNode(b.dataset.node,true));
  $('search').addEventListener('input',e=>{
    const q=e.target.value.trim().toLowerCase();
    document.querySelectorAll('.indexItem').forEach(b=>{const n=byId.get(b.dataset.node);b.style.display=!q||n.title.toLowerCase().includes(q)?'flex':'none';});
  });

  updatePanels();requestAnimationFrame(draw);
})();
</script>
</body>
